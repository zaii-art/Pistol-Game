<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>PISTOL FRONTLINE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body {
    height:100vh; width:100vw; background:#0a0e14; overflow:hidden;
    font-family: 'Courier New', monospace; touch-action:none;
  }
  @supports (height: 100dvh) {
    html, body { height:100dvh; }
  }
  #wrap {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at center, #131826 0%, #0a0e14 70%);
  }
  #stage {
    position:relative;
    width:100%; height:100%;
    max-width:1400px; max-height:900px;
  }
  canvas {
    display:block;
    width:100%; height:100%;
    image-rendering: pixelated;
    background:#0d1117;
  }
  #hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:3vh 3vw 0;
    pointer-events:none;
    color:#e8e2d4;
  }
  .label { font-size:clamp(9px,1.3vw,12px); letter-spacing:2px; color:#7a8497; margin-bottom:6px; }
  #healthBarOuter {
    width:clamp(140px,20vw,260px); height:18px; background:#1b2333; border:2px solid #3a4456;
  }
  #healthBarInner { height:100%; background: linear-gradient(90deg,#ff5a3c,#ff8c3c); width:100%; transition: width 0.15s; }
  #killCounterWrap { width:clamp(140px,20vw,260px); margin-top:8px; }
  #killBarOuter { width:100%; height:10px; background:#1b2333; border:2px solid #3a4456; }
  #killBarInner { height:100%; background:linear-gradient(90deg,#4c8cff,#7cb8ff); width:0%; }
  #killText { font-size:clamp(9px,1.2vw,11px); color:#9fb0c9; margin-top:3px; }
  #level { font-size:clamp(18px,2.6vw,28px); font-weight:bold; letter-spacing:3px; color:#ff8c3c; text-shadow: 0 0 8px rgba(255,140,60,0.6); }
  #score { font-size:clamp(11px,1.4vw,14px); color:#9fb0c9; margin-top:4px; }
  #weaponText { font-size:clamp(11px,1.4vw,14px); color:#ffb74c; margin-top:4px; letter-spacing:1px; }

  #bossBarWrap {
    position:absolute; top:3vh; left:50%; transform:translateX(-50%);
    width:min(50vw,500px); opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  #bossLabel { font-size:clamp(10px,1.3vw,13px); letter-spacing:3px; color:#ff2e2e; text-align:center; margin-bottom:4px; }
  #bossBarOuter { width:100%; height:12px; background:#1b2333; border:2px solid #3a4456; }
  #bossBarInner { height:100%; background:linear-gradient(90deg,#ff2e2e,#ff5a3c); width:100%; }

  #overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(8,10,16,0.94);
    color:#e8e2d4; text-align:center; gap:18px; z-index:20; padding:5vw;
  }
  #overlay h1 { font-size:clamp(28px,6vw,46px); letter-spacing:6px; color:#ff8c3c; text-shadow: 0 0 16px rgba(255,140,60,0.7); }
  #overlay p { font-size:clamp(12px,1.6vw,15px); color:#9fb0c9; max-width:560px; line-height:1.9; letter-spacing:0.5px; }
  #overlay .keys { color:#ff8c3c; }
  #overlay button {
    background:#ff8c3c; color:#0a0e14; border:none;
    font-family:'Courier New', monospace; font-weight:bold;
    font-size:clamp(14px,2vw,17px); letter-spacing:3px;
    padding:14px 32px; cursor:pointer; box-shadow: 0 4px 0 #b35e1f;
  }
  #overlay button:active { transform:translateY(2px); box-shadow: 0 2px 0 #b35e1f; }
  #overlay button.secondary { background:#2a3344; color:#cdd6e6; box-shadow: 0 4px 0 #14191f; }
  #overlay button.secondary:active { box-shadow: 0 2px 0 #14191f; }
  #overlay button.ghost { background:transparent; color:#7a8497; box-shadow:none; border:2px solid #3a4456; padding:12px 30px; }
  #overlay button.ghost:active { transform:translateY(2px); }
  .hidden { display:none !important; }

  /* Main menu layout */
  #menuBtnCol { display:flex; flex-direction:column; gap:14px; align-items:center; margin-top:4px; }
  #menuBtnCol button { width:clamp(220px,30vw,300px); }

  /* Character select grid */
  #charGrid {
    display:flex; gap:clamp(14px,2.5vw,28px); justify-content:center; flex-wrap:wrap;
    margin: 6px 0 4px;
  }
  .charCard {
    width:clamp(120px,16vw,170px);
    background:#11151f; border:2px solid #2a3344;
    padding:14px 10px 12px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .charCard:hover { border-color:#5a6678; }
  .charCard.selected { border-color:#ff8c3c; background:#1c1611; box-shadow: 0 0 16px rgba(255,140,60,0.25); }
  .charCard canvas { width:64px; height:96px; image-rendering:pixelated; }
  .charCard .charName { font-size:clamp(11px,1.4vw,13px); letter-spacing:2px; color:#cdd6e6; }
  .charCard .charTag { font-size:clamp(9px,1.1vw,10px); color:#6f7a8c; letter-spacing:1px; }
  .charCard.selected .charName { color:#ff8c3c; }

  /* On-screen controls */
  #controls {
    position:absolute; bottom:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:3vh 3vw; pointer-events:none;
  }
  .ctrl-group { display:flex; gap:14px; pointer-events:none; }
  .ctrl-btn {
    pointer-events:all;
    width:clamp(56px,8vw,80px); height:clamp(56px,8vw,80px);
    border-radius:50%;
    background:rgba(27,35,51,0.85); border:2px solid #3a4456;
    color:#e8e2d4; font-size:clamp(20px,3vw,28px); font-weight:bold;
    display:flex; align-items:center; justify-content:center;
    font-family:'Courier New', monospace;
    user-select:none; -webkit-user-select:none; touch-action:none;
  }
  .ctrl-btn:active, .ctrl-btn.pressed { background:rgba(255,140,60,0.35); border-color:#ff8c3c; }
  #shootBtn {
    width:clamp(72px,10vw,100px); height:clamp(72px,10vw,100px);
    background:rgba(255,90,60,0.25); border:3px solid #ff5a3c;
    color:#ffd28c; font-size:clamp(13px,1.6vw,16px); letter-spacing:1px;
  }
  #shootBtn:active, #shootBtn.pressed { background:rgba(255,90,60,0.55); }

  /* Top-right in-game icon buttons: pause + mute */
  #topRightIcons {
    position:absolute; top:3vh; right:3vw;
    display:flex; gap:10px;
    pointer-events:none;
  }
  .iconBtn {
    pointer-events:all;
    width:clamp(38px,5vw,46px); height:clamp(38px,5vw,46px);
    border-radius:8px;
    background:rgba(27,35,51,0.85); border:2px solid #3a4456;
    color:#cdd6e6; font-size:clamp(16px,2.2vw,20px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .iconBtn:active { background:rgba(255,140,60,0.35); border-color:#ff8c3c; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="hud">
      <div>
        <div class="label">HEALTH</div>
        <div id="healthBarOuter"><div id="healthBarInner"></div></div>
        <div id="killCounterWrap">
          <div class="label" id="killLabel">KILLS TOWARD BOSS</div>
          <div id="killBarOuter"><div id="killBarInner"></div></div>
          <div id="killText">0 / 50</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div id="level">WAVE 1</div>
        <div id="score">SCORE 0</div>
        <div id="weaponText">PISTOL</div>
      </div>
    </div>
    <div id="bossBarWrap">
      <div id="bossLabel">ENFORCER</div>
      <div id="bossBarOuter"><div id="bossBarInner"></div></div>
    </div>

    <div id="topRightIcons">
      <div class="iconBtn" id="muteBtn" title="Mute music">🔊</div>
      <div class="iconBtn" id="pauseBtn" title="Pause">❙❙</div>
    </div>

    <div id="controls">
      <div class="ctrl-group">
        <div class="ctrl-btn" id="backBtn">◀</div>
        <div class="ctrl-btn" id="fwdBtn">▶</div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-btn" id="shootBtn">FIRE</div>
      </div>
    </div>

    <div id="overlay"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  let W = 1280, H = 720; // logical resolution, scaled via canvas sizing
  const GROUND_Y = () => H - 100;

  function fitCanvas() {
    const stage = document.getElementById('stage');
    const rect = stage.getBoundingClientRect();
    canvas.width = Math.round(rect.width);
    canvas.height = Math.round(rect.height);
    W = canvas.width;
    H = canvas.height;
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', fitCanvas);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitCanvas);
  }
  // Mobile browsers sometimes report a slightly different viewport size right at
  // load before the address bar settles — re-check a couple times just in case.
  setTimeout(fitCanvas, 150);
  setTimeout(fitCanvas, 500);

  const overlay = document.getElementById('overlay');
  const healthBarInner = document.getElementById('healthBarInner');
  const levelEl = document.getElementById('level');
  const scoreEl = document.getElementById('score');
  const weaponTextEl = document.getElementById('weaponText');
  const killBarInner = document.getElementById('killBarInner');
  const killText = document.getElementById('killText');
  const killLabel = document.getElementById('killLabel');
  const bossBarWrap = document.getElementById('bossBarWrap');
  const bossBarInner = document.getElementById('bossBarInner');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');

  // ---- Input: keyboard ----
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    if (e.code === 'Escape') togglePause();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // ---- Input: on-screen buttons ----
  const touchState = { left:false, right:false, shoot:false };
  function bindHold(el, onDown, onUp) {
    const down = (e) => { e.preventDefault(); onDown(); el.classList.add('pressed'); };
    const up = (e) => { e.preventDefault(); onUp(); el.classList.remove('pressed'); };
    el.addEventListener('mousedown', down);
    el.addEventListener('touchstart', down, {passive:false});
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
    el.addEventListener('touchend', up, {passive:false});
    el.addEventListener('touchcancel', up, {passive:false});
  }
  bindHold(document.getElementById('backBtn'), () => touchState.left = true, () => touchState.left = false);
  bindHold(document.getElementById('fwdBtn'), () => touchState.right = true, () => touchState.right = false);
  bindHold(document.getElementById('shootBtn'), () => touchState.shoot = true, () => touchState.shoot = false);

  // ---- Characters (custom cast — distinct sprites, normalized to the same height/footprint, same stats) ----
  const CHARACTERS = [
    { id:0, name:'HYUNJIN', tag:'CAMO RECON', draw: drawHyunjin },
    { id:1, name:'MEMA CAT', tag:'BANANA UNIT', draw: drawMemaCat },
    { id:2, name:'LEBRON JAMES', tag:'KING UNIT', draw: drawLebron },
  ];
  let selectedChar = 0;

  // Shared body scale reference: every character is drawn feet-at-(0,0), head-top near y=-58,
  // so all three read as "the same size" in the select grid and in-game, despite different shapes.

  function drawHyunjin(c, hitFlash, walkPhase) {
    const stride = Math.sin(walkPhase) * 7; // +front leg forward, -back leg forward
    const bob = Math.abs(Math.cos(walkPhase)) * 2;
    // back leg (trailing, toward -x)
    c.fillStyle = '#7a7f5e';
    c.fillRect(-6 - stride * 0.4, -22 + bob, 7, 22 - bob);
    // front leg (leading, toward +x — the direction the character faces)
    c.fillStyle = '#9a9a78';
    c.fillRect(1 + stride * 0.6, -22 + bob, 7, 22 - bob);
    // camo speckles
    c.fillStyle = '#5e6b4a';
    c.fillRect(-4 - stride * 0.4, -16 + bob, 3, 3);
    c.fillRect(4 + stride * 0.6, -12 + bob, 3, 3);
    // boots
    c.fillStyle = '#2a241c';
    c.fillRect(-7 - stride * 0.4, -3 + bob, 8, 4);
    c.fillRect(1 + stride * 0.6, -3 + bob, 8, 4);
    // torso (camo jacket) — profile, slightly forward-leaning
    c.fillStyle = hitFlash ? '#ffffff' : '#9a9a78';
    c.fillRect(-9, -44 + bob*0.3, 20, 22);
    c.fillStyle = hitFlash ? '#ffffff' : '#6e7a52';
    c.fillRect(-9, -44 + bob*0.3, 7, 8);
    c.fillRect(4, -37 + bob*0.3, 6, 8);
    c.fillRect(-5, -29 + bob*0.3, 6, 5);
    // back arm (trailing, small sliver behind torso)
    c.fillStyle = '#e3bd99';
    c.fillRect(-10, -38 + bob*0.3, 4, 10);
    // front arm extends forward to hold the gun (gun drawn separately by drawSoldier)
    c.fillStyle = '#f0c9a8';
    c.fillRect(7, -39 + bob*0.3, 11, 6);
    // head — side profile facing +x: round skull, brow, nose bump, jaw
    c.fillStyle = '#f7d8bb';
    c.fillRect(-6, -58, 13, 14); // skull/cheek
    c.fillRect(5, -52, 4, 5);    // nose bump
    c.fillStyle = '#f2a08a';
    c.fillRect(-5, -47, 2, 2);   // cheek blush
    // eye (single, profile)
    c.fillStyle = '#1a1410';
    c.fillRect(1, -50, 3, 3);
    // ear
    c.fillStyle = '#e3bd99';
    c.fillRect(-7, -50, 3, 4);
    // blonde tousled hair, swept toward the back (-x)
    c.fillStyle = '#c9954f';
    c.fillRect(-9, -64, 16, 9);
    c.fillRect(-11, -60, 4, 7);
    c.fillRect(-12, -56, 3, 5);
    c.fillStyle = '#e0b870';
    c.fillRect(-3, -63, 6, 4);
    c.fillRect(2, -61, 4, 4);
  }

  function drawMemaCat(c, hitFlash, walkPhase) {
    const stride = Math.sin(walkPhase) * 5;
    const bob = Math.abs(Math.cos(walkPhase)) * 2;
    // paw legs
    c.fillStyle = '#c2935a';
    c.fillRect(-6 - stride * 0.4, -16 + bob, 6, 16 - bob);
    c.fillStyle = '#d9a86a';
    c.fillRect(1 + stride * 0.6, -16 + bob, 6, 16 - bob);
    // banana peel skirt bottom
    c.fillStyle = '#7a5230';
    c.fillRect(-9, -24 + bob*0.3, 20, 9);
    // banana body — profile silhouette (slightly tapered front toward +x)
    c.fillStyle = hitFlash ? '#ffffff' : '#f6d227';
    c.fillRect(-11, -55 + bob*0.3, 24, 32);
    c.fillStyle = hitFlash ? '#ffffff' : '#e0b81a';
    c.fillRect(-11, -55 + bob*0.3, 5, 32); // back ridge shading
    // back little arm (trailing)
    c.fillStyle = '#c2935a';
    c.fillRect(-15, -42 + bob*0.3, 5, 5);
    // front little arm/paw reaching forward (toward gun)
    c.fillStyle = '#d9a86a';
    c.fillRect(11, -41 + bob*0.3, 8, 5);
    // banana stem near the back/top
    c.fillStyle = '#6b4222';
    c.fillRect(-4, -68 + bob*0.3, 6, 13);
    c.fillStyle = '#523018';
    c.fillRect(-4, -68 + bob*0.3, 6, 4);
    // hood opening with cat face — profile
    c.fillStyle = '#f6d227';
    c.fillRect(-9, -56 + bob*0.3, 20, 6);
    c.fillStyle = '#c2935a';
    c.fillRect(-7, -53 + bob*0.3, 17, 16);
    c.fillStyle = '#f0d9b8';
    c.fillRect(-2, -49 + bob*0.3, 9, 11);
    // ear poking above hood (just one visible in profile)
    c.fillStyle = '#c2935a';
    c.fillRect(-5, -58 + bob*0.3, 5, 5);
    // eye (profile, single)
    c.fillStyle = '#1a1410';
    c.fillRect(3, -47 + bob*0.3, 3, 3);
    // tear streak
    c.fillStyle = '#9cd3d6';
    c.fillRect(3, -44 + bob*0.3, 2, 4);
    // nose/snout toward +x
    c.fillStyle = '#e0907c';
    c.fillRect(6, -43 + bob*0.3, 4, 3);
  }

  function drawLebron(c, hitFlash, walkPhase) {
    const stride = Math.sin(walkPhase) * 7;
    const bob = Math.abs(Math.cos(walkPhase)) * 2;
    // back leg
    c.fillStyle = '#48301f';
    c.fillRect(-6 - stride * 0.4, -20 + bob, 7, 20 - bob);
    // front leg
    c.fillStyle = '#5a3a28';
    c.fillRect(1 + stride * 0.6, -20 + bob, 7, 20 - bob);
    // shoes
    c.fillStyle = '#e8e4dc';
    c.fillRect(-7 - stride * 0.4, -4 + bob, 8, 4);
    c.fillRect(1 + stride * 0.6, -4 + bob, 8, 4);
    c.fillStyle = '#c81e2c';
    c.fillRect(-7 - stride * 0.4, -2 + bob, 8, 2);
    c.fillRect(1 + stride * 0.6, -2 + bob, 8, 2);
    // shorts
    c.fillStyle = hitFlash ? '#ffffff' : '#f4f1ea';
    c.fillRect(-8, -30 + bob*0.3, 18, 12);
    c.fillStyle = hitFlash ? '#ffffff' : '#c81e2c';
    c.fillRect(-8, -30 + bob*0.3, 18, 3);
    // jersey torso — profile
    c.fillStyle = hitFlash ? '#ffffff' : '#f4f1ea';
    c.fillRect(-9, -46 + bob*0.3, 19, 18);
    c.fillStyle = hitFlash ? '#ffffff' : '#c8a356';
    c.fillRect(-9, -46 + bob*0.3, 19, 4);
    // jersey number (side, smaller)
    c.fillStyle = '#c81e2c';
    c.fillRect(-2, -41 + bob*0.3, 5, 8);
    // back arm (trailing)
    c.fillStyle = '#48301f';
    c.fillRect(-12, -42 + bob*0.3, 4, 11);
    // front arm extending forward toward the gun
    c.fillStyle = '#5a3a28';
    c.fillRect(7, -41 + bob*0.3, 11, 6);
    // head — bald, bearded, profile facing +x
    c.fillStyle = '#5a3a28';
    c.fillRect(-6, -59 + bob*0.3, 14, 14);
    c.fillRect(5, -53 + bob*0.3, 4, 5); // nose
    // beard shading along jaw and chin
    c.fillStyle = '#2c1c14';
    c.fillRect(-6, -49 + bob*0.3, 14, 5);
    c.fillRect(2, -46 + bob*0.3, 6, 4);
    // eye (profile, single)
    c.fillStyle = '#1a1410';
    c.fillRect(1, -53 + bob*0.3, 3, 3);
    // ear
    c.fillStyle = '#48301f';
    c.fillRect(-7, -51 + bob*0.3, 3, 4);
  }

  function drawCharPreview(canvasEl, charDef) {
    const c = canvasEl.getContext('2d');
    const cw = canvasEl.width, ch = canvasEl.height;
    c.clearRect(0,0,cw,ch);
    c.save();
    c.translate(cw/2, ch - 6);
    c.scale(1.05, 1.05);
    charDef.draw(c, false, 0);
    c.restore();
  }

  // ---- Custom enemy sprites (background already removed offline; transparent PNGs) ----

hBn+x75ZvAAAAAElFTkSuQmCC"

  const ENEMY_SPRITE_NAMES = ['BOAR RAIDER', 'REAPER', 'BLOOD GOBLIN'];
  const enemySprites = ENEMY_SPRITE_B64.map((b64, i) => {
    const img = new Image();
    const obj = { img, loaded:false, w:0, h:0 };
    img.onload = () => { obj.loaded = true; obj.w = img.naturalWidth; obj.h = img.naturalHeight; };
    img.src = 'data:image/png;base64,' + b64;
    return obj;
  });
  const ENEMY_DISPLAY_HEIGHT = 64; // all enemy sprites are scaled to this height so sizing stays consistent

  // ---- Game state ----
  let state = 'intro'; // intro, menu, charselect, credits, playing, paused, levelTransition, gameover, win, exited
  let stateBeforePause = 'playing';
  let wave = 1;
  let score = 0;
  let frame = 0;
  let killCount = 0;
  let totalKillsForBoss = 50;
  let bossActive = false;
  let bossesDefeated = 0;

  const player = {
    x: 100, y: 0, w: 30, h: 46,
    vx: 0,
    facing: 1,
    shootCooldown: 0,
    invuln: 0,
    hp: 100, maxHp: 100,
    gunTier: 0, // 0 = starting pistol. Each pickup permanently increases this — never lost.
    magAmmo: 0,
    reloadTimer: 0,
    walkPhase: 0, // advances only while moving, drives the leg stride animation
  };

  let enemies = [];
  let boss = null;
  let bullets = [];
  let particles = [];
  let spawnTimer = 0;
  let worldScroll = 0; // accumulates with player movement; drives skyline/background parallax only (road stays static)
  let weaponPickup = null;
  let weaponPickupSpawned = false;

  const MOVE_SPEED = 4.2;
  const WORLD_LEFT_PAD = 60;
  const STAB_DAMAGE = 14;
  const STAB_KNOCKBACK = 50;

  // Wave 1 needs 20 kills to drop the first upgrade, every wave after needs 30.
  function gunThresholdForWave(w) {
    if (w <= 1) return 20;
    return 30;
  }

  // Each pickup is a permanent upgrade. Tier 0 is the starting pistol; every
  // tier after is a stronger gun. The list covers the first few tiers by name,
  // then keeps generating progressively stronger guns automatically forever,
  // so every wave can drop something new no matter how far the run goes.
  // magSize/reloadTime stop the faster guns from being held down and spammed forever —
  // burn through the clip and you're stuck reloading for a bit.
  const PISTOL = { name: 'PISTOL', bulletSpeed: 13, fireCooldown: 38, damage: 12, bulletColor: '#ffd28c', magSize: 8, reloadTime: 65 };
  const GUN_TIERS = [
    { name: 'RIFLE',   bulletSpeed: 15, fireCooldown: 28, damage: 20, bulletColor: '#8cd2ff', magSize: 12, reloadTime: 70 },
    { name: 'CANNON',  bulletSpeed: 17, fireCooldown: 25, damage: 32, bulletColor: '#ffb74c', magSize: 7,  reloadTime: 85 },
    { name: 'RAILGUN', bulletSpeed: 19, fireCooldown: 19, damage: 46, bulletColor: '#ff5a8c', magSize: 5,  reloadTime: 95 },
    { name: 'PLASMA',  bulletSpeed: 21, fireCooldown: 15, damage: 62, bulletColor: '#7cffb0', magSize: 9,  reloadTime: 80 },
  ];
  function getGunForTier(tier) {
    if (tier <= 0) return PISTOL;
    const idx = tier - 1;
    if (idx < GUN_TIERS.length) return GUN_TIERS[idx];
    // Beyond the named tiers: keep scaling up damage and fire rate, but shrink the
    // clip and stretch the reload a little each step so raw power doesn't run unchecked.
    const extra = idx - GUN_TIERS.length + 1;
    const base = GUN_TIERS[GUN_TIERS.length - 1];
    return {
      name: `OMEGA MK${extra}`,
      bulletSpeed: base.bulletSpeed + extra,
      fireCooldown: Math.max(10, base.fireCooldown - extra),
      damage: base.damage + extra * 16,
      bulletColor: '#ff3df0',
      magSize: Math.max(3, base.magSize - Math.floor(extra / 2)),
      reloadTime: base.reloadTime + extra * 4,
    };
  }

  function resetPlayer() {
    player.x = WORLD_LEFT_PAD + 40;
    player.vx = 0;
    player.facing = 1;
    player.hp = player.maxHp;
    player.gunTier = 0;
    player.magAmmo = PISTOL.magSize;
    player.reloadTimer = 0;
    player.walkPhase = 0;
  }

  function difficultyForWave() {
    // The longer you survive within a wave, more enemies spawn and more can be on screen at once.
    // Each wave (after a boss kill) raises baseline toughness, speed, pack size, and spawn rate,
    // so later levels keep getting harder — but level 1 starts a notch softer than that curve.
    const waveHpBonus = (wave - 1) * 14;
    const waveSpeedBonus = (wave - 1) * 0.18;
    const waveSpawnBonus = (wave - 1) * 4;
    const wavePackBonus = Math.floor((wave - 1) * 1.4);
    const spawnInterval = Math.max(26, 90 - killCount * 0.9 - waveSpawnBonus);
    const enemySpeed = Math.min(2.3, 1.0 + waveSpeedBonus + killCount * 0.012);
    const maxOnScreen = Math.min(20, 3 + Math.floor(killCount / 5) + wavePackBonus);
    const baseHp = wave <= 1 ? 15 : 18; // level 1 enemies are noticeably squishier than the curve later waves follow
    const enemyHp = baseHp + waveHpBonus;
    return { spawnInterval, enemySpeed, maxOnScreen, enemyHp };
  }

  function spawnEnemy() {
    const { enemySpeed, enemyHp } = difficultyForWave();
    // Random art per spawn: each new enemy independently picks one of the 3 custom sprites.
    const spriteIdx = Math.floor(Math.random() * enemySprites.length);
    enemies.push({
      x: W + 40,
      y: GROUND_Y(),
      w: 28, h: 42,
      hp: enemyHp, maxHp: enemyHp,
      speed: enemySpeed * (0.85 + Math.random()*0.3),
      alive: true,
      stabCooldown: 0,
      hitFlash: 0,
      spriteIdx,
    });
  }

  function startBoss() {
    bossActive = true;
    bossesDefeated++;
    boss = {
      // Boss toughness reduced — level 1 boss now starts at 200 HP instead of 560,
      // and later boss fights still scale up from that lower baseline.
      x: W + 80, y: GROUND_Y(), w: 100, h: 110,
      hp: 200 + (bossesDefeated - 1) * 190,
      maxHp: 200 + (bossesDefeated - 1) * 190,
      speed: 0.4 + bossesDefeated * 0.05,
      stabCooldown: 0,
      hitFlash: 0,
      alive: true,
    };
    bossBarWrap.style.opacity = 1;
    document.getElementById('bossLabel').textContent = `ENFORCER ${bossesDefeated}`;
  }

  function startGame() {
    initAudio();
    wave = 1; score = 0; killCount = 0; bossActive = false; bossesDefeated = 0;
    enemies = []; bullets = []; particles = []; boss = null; spawnTimer = 0;
    weaponPickup = null; weaponPickupSpawned = false;
    worldScroll = 0;
    bossBarWrap.style.opacity = 0;
    resetPlayer();
    state = 'playing';
    overlay.classList.add('hidden');
    updateTopIconsVisibility();
  }

  // ---- Pause / in-game menu ----
  function updateTopIconsVisibility() {
    const show = (state === 'playing' || state === 'paused');
    document.getElementById('topRightIcons').style.display = show ? 'flex' : 'none';
  }

  function togglePause() {
    if (state === 'playing') pauseGame();
    else if (state === 'paused') resumeGame();
  }

  function pauseGame() {
    if (state !== 'playing') return;
    stateBeforePause = state;
    state = 'paused';
    overlay.innerHTML = `
      <h1 style="font-size:clamp(22px,4.5vw,34px);">PAUSED</h1>
      <p>Wave ${wave} — Score ${score}. Take a breath, soldier.</p>
      <div id="menuBtnCol">
        <button id="resumeBtn">RESUME</button>
        <button id="pauseToMenuBtn" class="secondary">BACK TO MAIN MENU</button>
      </div>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('resumeBtn').addEventListener('click', resumeGame, { once:true });
    document.getElementById('pauseToMenuBtn').addEventListener('click', () => {
      state = 'menu';
      showMainMenu();
    }, { once:true });
  }

  function resumeGame() {
    if (state !== 'paused') return;
    state = 'playing';
    overlay.classList.add('hidden');
  }

  pauseBtn.addEventListener('click', () => {
    if (state === 'playing') pauseGame();
    else if (state === 'paused') resumeGame();
  });

  function difficultyForWaveUnused() {} // no-op placeholder kept for clarity of diff (unused)

  // ---- Intro / loading screen ----
  function showIntro() {
    state = 'intro';
    bossBarWrap.style.opacity = 0;
    updateTopIconsVisibility();
    overlay.innerHTML = `
      <h1 id="introTitle">PISTOL FRONTLINE</h1>
      <div id="introBarOuter" style="width:min(70vw,360px); height:14px; background:#1b2333; border:2px solid #3a4456; margin-top:6px;">
        <div id="introBarInner" style="height:100%; width:0%; background:linear-gradient(90deg,#ff5a3c,#ff8c3c); transition:width 0.15s;"></div>
      </div>
      <p id="introStatus" style="margin-top:2px;">LOADING ASSETS...</p>
      <p style="color:#5a6678; font-size:clamp(10px,1.3vw,12px); margin-top:18px;">A GAME BY <span class="keys">@crazyszai</span></p>
    `;
    overlay.classList.remove('hidden');
    const barInner = document.getElementById('introBarInner');
    const status = document.getElementById('introStatus');
    const startTime = performance.now();
    const MIN_INTRO_MS = 1600;

    function poll() {
      if (state !== 'intro') return; // user may have skipped via tap
      const loadedCount = enemySprites.filter(s => s.loaded).length;
      const loadPct = loadedCount / enemySprites.length;
      const elapsed = performance.now() - startTime;
      const timePct = Math.min(1, elapsed / MIN_INTRO_MS);
      const pct = Math.min(1, Math.min(loadPct, 1) * 0.5 + timePct * 0.5);
      barInner.style.width = `${pct * 100}%`;
      if (pct >= 1) {
        status.textContent = 'READY';
        setTimeout(() => { if (state === 'intro') showMainMenu(); }, 250);
      } else {
        requestAnimationFrame(poll);
      }
    }
    requestAnimationFrame(poll);

    // Tap/click anywhere on the intro screen skips straight to the main menu.
    overlay.addEventListener('click', () => { if (state === 'intro') showMainMenu(); }, { once:true });
  }

  }

  // ---- Menu screens ----
  function showMainMenu() {
    state = 'menu';
    bossBarWrap.style.opacity = 0;
    updateTopIconsVisibility();
    overlay.innerHTML = `
      <h1>PISTOL FRONTLINE</h1>
      <p>Enemies rush in from the right to stab you. Shoot them down before they reach you. Kill <span class="keys">50 enemies</span> to summon the Enforcer boss.</p>
      <div id="menuBtnCol">
        <button id="startBtn">START</button>
        <button id="charSelectBtn" class="secondary">SELECT CHARACTER</button>
        <button id="creditsMenuBtn" class="secondary">CREDITS</button>
        <button id="exitBtn" class="ghost">EXIT</button>
      </div>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('startBtn').addEventListener('click', startGame, { once:true });
    document.getElementById('charSelectBtn').addEventListener('click', showCharSelect, { once:true });
    document.getElementById('creditsMenuBtn').addEventListener('click', showCredits, { once:true });
    document.getElementById('exitBtn').addEventListener('click', tryExit, { once:true });
  }

  function showCharSelect() {
    state = 'charselect';
    const cardsHtml = CHARACTERS.map(c => `
      <div class="charCard${c.id === selectedChar ? ' selected' : ''}" data-id="${c.id}">
        <canvas width="64" height="96" data-preview="${c.id}"></canvas>
        <div class="charName">${c.name}</div>
        <div class="charTag">${c.tag}</div>
      </div>
    `).join('');
    overlay.innerHTML = `
      <h1 style="font-size:clamp(20px,4vw,32px);">SELECT CHARACTER</h1>
      <div id="charGrid">${cardsHtml}</div>
      <div id="menuBtnCol">
        <button id="confirmCharBtn">CONFIRM</button>
        <button id="backToMenuBtn" class="ghost">BACK</button>
      </div>
    `;
    overlay.classList.remove('hidden');

    overlay.querySelectorAll('canvas[data-preview]').forEach(cv => {
      const id = parseInt(cv.dataset.preview, 10);
      drawCharPreview(cv, CHARACTERS[id]);
    });

    overlay.querySelectorAll('.charCard').forEach(card => {
      card.addEventListener('click', () => {
        selectedChar = parseInt(card.dataset.id, 10);
        overlay.querySelectorAll('.charCard').forEach(c2 => c2.classList.remove('selected'));
        card.classList.add('selected');
      });
    });

    document.getElementById('confirmCharBtn').addEventListener('click', showMainMenu, { once:true });
    document.getElementById('backToMenuBtn').addEventListener('click', showMainMenu, { once:true });
  }

  function tryExit() {
    // Browsers generally block scripted tab/window closing unless the tab was
    // opened by a script, so window.close() is attempted but a fallback screen
    // covers the case where the browser ignores it.
    window.close();
    setTimeout(() => {
      if (!document.hidden) showExitFallback();
    }, 250);
  }

  function showExitFallback() {
    state = 'exited';
    bossBarWrap.style.opacity = 0;
    updateTopIconsVisibility();
    overlay.innerHTML = `
      <h1>THANKS FOR PLAYING</h1>
      <p>Your browser won't let the page close itself. You can close this tab manually, or jump back in below.</p>
      <div id="menuBtnCol">
        <button id="backToMenuBtn2">BACK TO MENU</button>
      </div>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('backToMenuBtn2').addEventListener('click', showMainMenu, { once:true });
  }

  function showOverlay(title, text, btnText) {
    overlay.innerHTML = `<h1>${title}</h1><p>${text}</p><div id="menuBtnCol"><button id="retryBtn">${btnText}</button><button id="menuBtn2" class="ghost">MAIN MENU</button></div>`;
    overlay.classList.remove('hidden');
    document.getElementById('retryBtn').addEventListener('click', startGame, { once:true });
    document.getElementById('menuBtn2').addEventListener('click', showMainMenu, { once:true });
  }

  function gameOver() {
    state = 'gameover';
    bossBarWrap.style.opacity = 0;
    updateTopIconsVisibility();
    showOverlay('YOU WERE OVERRUN', `Killed: ${killCount}. Score: ${score}. The line broke.`, 'TRY AGAIN');
  }

  function bossDefeated() {
    state = 'levelTransition';
    bossBarWrap.style.opacity = 0;
    score += 2000;
    setTimeout(() => {
      bossActive = false;
      boss = null;
      killCount = 0;
      wave++;
      // Weapons earned so far (rifle, and ammo for the heavy gun if mid-clip) carry into the next wave.
      weaponPickup = null;
      weaponPickupSpawned = false;
      state = 'playing';
    }, 900);
  }

  function playerShoot() {
    if (player.shootCooldown > 0 || player.reloadTimer > 0) return;
    const w = getGunForTier(player.gunTier);
    if (player.magAmmo <= 0) {
      player.reloadTimer = w.reloadTime;
      return;
    }
    player.shootCooldown = w.fireCooldown;
    player.magAmmo--;
    const muzzleX = player.x + 22 * player.facing;
    const muzzleY = GROUND_Y() - player.h * 0.6;
    bullets.push({
      x: muzzleX,
      y: muzzleY,
      vx: w.bulletSpeed * player.facing,
      w: 10, h: 4,
      damage: w.damage,
      color: w.bulletColor,
    });
    // Muzzle flash burst at the gun tip every time it fires.
    spawnMuzzleFlash(muzzleX, muzzleY, w.bulletColor, player.facing);
    playShotSound();
    if (player.magAmmo <= 0) {
      player.reloadTimer = w.reloadTime;
    }
  }

  function spawnMuzzleFlash(x, y, color, facing) {
    for (let i=0;i<6;i++) {
      particles.push({
        x: x + facing*4, y: y + (Math.random()-0.5)*4,
        vx: facing*(2+Math.random()*4), vy:(Math.random()-0.5)*2,
        life: 8+Math.random()*6, color, flash:true,
      });
    }
  }

  function spawnParticles(x, y, color, n=10) {
    for (let i=0;i<n;i++) {
      particles.push({ x, y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5-1, life: 22+Math.random()*10, color });
    }
  }

  function update() {
    frame++;
    if (state !== 'playing') return;

    // Movement
    let moveX = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) moveX -= 1;
    if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) moveX += 1;
    player.vx = moveX * MOVE_SPEED;
    // Enemies and the boss always approach from the right, so the player faces right by
    // default and only turns to face left while actively holding the left input.
    player.facing = moveX < 0 ? -1 : 1;
    player.x += player.vx;
    player.x = Math.max(WORLD_LEFT_PAD, Math.min(W - 140, player.x));
    worldScroll += player.vx; // world scrolls opposite-feeling to player walking forward, matching real movement
    if (moveX !== 0) player.walkPhase += 0.28; // advances the leg-stride cycle while actively moving

    // Shooting
    const wantsShoot = keys['KeyJ'] || keys['KeyF'] || keys['Space'] || touchState.shoot;
    if (wantsShoot) playerShoot();
    if (player.shootCooldown > 0) player.shootCooldown--;
    if (player.reloadTimer > 0) {
      player.reloadTimer--;
      if (player.reloadTimer <= 0) {
        player.reloadTimer = 0;
        player.magAmmo = getGunForTier(player.gunTier).magSize;
      }
    }
    if (player.invuln > 0) player.invuln--;

    // Spawning (only while not in boss fight)
    if (!bossActive) {
      const { spawnInterval, maxOnScreen } = difficultyForWave();
      spawnTimer++;
      if (spawnTimer >= spawnInterval && enemies.filter(e=>e.alive).length < maxOnScreen) {
        spawnEnemy();
        spawnTimer = 0;
      }
    }

    // Enemy movement + stab
    enemies.forEach(e => {
      if (!e.alive) return;
      if (e.hitFlash > 0) e.hitFlash--;
      const dist = e.x - player.x;
      const touchDistance = e.w/2 + player.w/2 - 4;
      if (Math.abs(dist) > touchDistance) {
        e.x += dist > 0 ? -e.speed : e.speed;
      } else {
        // stab range
        if (e.stabCooldown <= 0) {
          if (player.invuln <= 0) {
            player.hp -= STAB_DAMAGE;
            player.invuln = 40;
            spawnParticles(player.x, GROUND_Y()-player.h*0.6, '#ff5a3c', 12);
            if (player.hp <= 0) { player.hp = 0; gameOver(); }
          }
          e.stabCooldown = 50;
          // knockback enemy so it doesn't permanently sit on player
          e.x += dist >= 0 ? STAB_KNOCKBACK : -STAB_KNOCKBACK;
          e.alive = false; // enemy "bounces off" — dies on successful stab
          spawnParticles(e.x, e.y - e.h*0.5, '#5a6678', 10);
        }
      }
      if (e.stabCooldown > 0) e.stabCooldown--;
    });

    // Boss movement + contact = instant kill
    if (boss && boss.alive) {
      if (boss.hitFlash > 0) boss.hitFlash--;
      const dist = boss.x - player.x;
      const touchDistance = boss.w/2 + player.w/2 - 6; // slight overlap so it visibly touches, no gap
      if (Math.abs(dist) > touchDistance) {
        boss.x += dist > 0 ? -boss.speed : boss.speed;
      } else {
        // Boss reached the player — instant kill, ignores invulnerability
        player.hp = 0;
        spawnParticles(player.x, GROUND_Y()-player.h*0.6, '#ff2e2e', 24);
        gameOver();
      }
      boss.x = Math.max(WORLD_LEFT_PAD + 100, boss.x);
    }

    // Bullets
    bullets.forEach(b => { b.x += b.vx; });
    bullets = bullets.filter(b => b.x > -20 && b.x < W + 20);

    bullets.forEach(b => {
      enemies.forEach(e => {
        if (!e.alive) return;
        if (Math.abs(b.x - e.x) < e.w/2 + b.w/2) {
          e.hp -= b.damage;
          e.hitFlash = 6;
          b.dead = true;
          spawnParticles(b.x, GROUND_Y()-e.h*0.5, '#ffb74c', 5);
          if (e.hp <= 0) {
            e.alive = false;
            killCount++;
            score += 50;
            spawnParticles(e.x, e.y - e.h*0.5, '#ff5a3c', 14);
          }
        }
      });
      if (boss && boss.alive && Math.abs(b.x - boss.x) < boss.w/2 + b.w/2) {
        boss.hp -= b.damage;
        boss.hitFlash = 6;
        b.dead = true;
        spawnParticles(b.x, GROUND_Y()-boss.h*0.5, '#ff8c3c', 6);
        if (boss.hp <= 0) {
          boss.alive = false;
          spawnParticles(boss.x, boss.y - boss.h*0.5, '#ff2e2e', 40);
          bossDefeated();
        }
      }
    });
    bullets = bullets.filter(b => !b.dead);

    // Remove dead enemies and any that drifted off-screen
    enemies = enemies.filter(e => e.alive && e.x > -60 && e.x < W + 100);

    // Particles
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; });
    particles = particles.filter(p => p.life > 0);

    // Weapon pickup: spawns once per wave, center screen, at the kill milestone.
    // Every pickup is the next gun tier up — a permanent upgrade that's never taken away.
    if (!weaponPickupSpawned && !bossActive && killCount >= gunThresholdForWave(wave)) {
      const nextTier = player.gunTier + 1;
      weaponPickup = { x: W/2, y: GROUND_Y(), w: 30, h: 16, bob: 0, tier: nextTier, stats: getGunForTier(nextTier) };
      weaponPickupSpawned = true;
    }
    if (weaponPickup) {
      weaponPickup.bob += 0.08;
      if (Math.abs(weaponPickup.x - player.x) < (weaponPickup.w/2 + player.w/2)) {
        player.gunTier = weaponPickup.tier;
        player.magAmmo = weaponPickup.stats.magSize;
        player.reloadTimer = 0;
        spawnParticles(weaponPickup.x, weaponPickup.y - 20, weaponPickup.stats.bulletColor, 18);
        weaponPickup = null;
      }
    }

    // Boss trigger
    if (!bossActive && killCount >= totalKillsForBoss) {
      enemies = [];
      weaponPickup = null;
      startBoss();
    }

    // HUD
    healthBarInner.style.width = `${Math.max(0,player.hp/player.maxHp*100)}%`;
    levelEl.textContent = bossActive ? `WAVE ${wave} — BOSS` : `WAVE ${wave}`;
    scoreEl.textContent = `SCORE ${score}`;
    weaponTextEl.textContent = player.reloadTimer > 0
      ? `${getGunForTier(player.gunTier).name} — RELOADING`
      : `${getGunForTier(player.gunTier).name} ${player.magAmmo}/${getGunForTier(player.gunTier).magSize}`;
    weaponTextEl.style.color = player.reloadTimer > 0 ? '#ff5a3c' : '#ffb74c';
    if (bossActive) {
      killLabel.textContent = 'BOSS FIGHT';
      killText.textContent = boss ? `${Math.max(0,Math.ceil(boss.hp))} / ${boss.maxHp} HP` : '';
      killBarInner.style.width = boss ? `${Math.max(0,boss.hp/boss.maxHp*100)}%` : '0%';
      if (boss) bossBarInner.style.width = `${Math.max(0,boss.hp/boss.maxHp*100)}%`;
    } else {
      killLabel.textContent = 'KILLS TOWARD BOSS';
      killText.textContent = `${killCount} / ${totalKillsForBoss}`;
      killBarInner.style.width = `${Math.min(100, killCount/totalKillsForBoss*100)}%`;
    }
  }

  // ---- Render ----
  function drawSoldier(x, gy, facing, hitFlash, isMoving) {
    const cd = CHARACTERS[selectedChar];
    ctx.save();
    ctx.translate(x, gy);
    ctx.scale(facing, 1);
    // Idle stance uses a fixed phase (legs together); walking uses the live accumulator
    // so the stride keeps advancing smoothly while a direction is held.
    const walkPhase = isMoving ? player.walkPhase : 0;

    cd.draw(ctx, hitFlash, walkPhase);

    // weapon — visually scales with the current permanent gun tier, however high it goes.
    // Drawn the same way for every character so upgrades stay readable regardless of cast pick.
    const tier = player.gunTier;
    const gunColor = getGunForTier(tier).bulletColor;
    const barrelLen = Math.min(34, 13 + tier * 5);
    const barrelThick = Math.min(9, 4 + tier);
    const barrelY = -37 - Math.floor((barrelThick - 4) / 2);
    ctx.fillStyle = '#1a1f2b';
    ctx.fillRect(8, barrelY, barrelLen, barrelThick);
    if (tier > 0) ctx.fillRect(8 + barrelLen, barrelY - 2, 5, barrelThick - 1); // scope/attachment on any upgrade
    ctx.fillStyle = gunColor;
    ctx.fillRect(8, barrelY, 4, barrelThick);
    ctx.restore();
  }

  function drawEnemy(e) {
    if (!e.alive) return;
    const sprite = enemySprites[e.spriteIdx % enemySprites.length];
    const bob = Math.sin((e.x + frame) * 0.3) * 1.5;

    if (sprite && sprite.loaded) {
      const dispH = ENEMY_DISPLAY_HEIGHT;
      const dispW = sprite.w * (dispH / sprite.h);
      ctx.save();
      ctx.translate(e.x, e.y + bob);
      // drawn unmirrored so the art faces left, toward the player
      if (e.hitFlash > 0) {
        // brief white hit-flash silhouette behind the sprite on a hit
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.filter = 'brightness(0) invert(1)';
        ctx.drawImage(sprite.img, -dispW/2, -dispH, dispW, dispH);
        ctx.restore();
      }
      ctx.drawImage(sprite.img, -dispW/2, -dispH, dispW, dispH);
      ctx.restore();
    } else {
      // fallback while the sprite is still loading: simple silhouette block
      ctx.fillStyle = '#5a2e2e';
      ctx.fillRect(e.x - 12, e.y - 42 + bob, 24, 42);
    }

    const w = 26;
    ctx.fillStyle = '#1b2333';
    ctx.fillRect(e.x - w/2, e.y - ENEMY_DISPLAY_HEIGHT - 8, w, 4);
    ctx.fillStyle = '#ff5a3c';
    ctx.fillRect(e.x - w/2, e.y - ENEMY_DISPLAY_HEIGHT - 8, w * Math.max(0,e.hp/e.maxHp), 4);
  }

  function drawBoss() {
    if (!boss || !boss.alive) return;
    ctx.save();
    ctx.translate(boss.x, boss.y);
    ctx.scale(-1, 1); // faces left toward the player
    const flash = boss.hitFlash > 0;
    const bob = Math.sin(frame * 0.12) * 2;
    const col = (c) => flash ? '#ffffff' : c;

    // black dress shoes / suit trousers
    ctx.fillStyle = col('#1c1c22');
    ctx.fillRect(-20, -34 + bob, 16, 34);
    ctx.fillRect(4, -34 - bob, 16, 34);
    ctx.fillStyle = '#0c0c10';
    ctx.fillRect(-21, -4 + bob, 17, 6);
    ctx.fillRect(3, -4 - bob, 17, 6);

    // black suit jacket torso, open over a white shirt
    ctx.fillStyle = col('#23232b');
    ctx.fillRect(-30, -88, 60, 56);
    // white shirt v-front
    ctx.fillStyle = col('#eceae4');
    ctx.fillRect(-8, -88, 16, 32);
    // jacket lapels framing the shirt
    ctx.fillStyle = col('#1a1a20');
    ctx.fillRect(-14, -88, 7, 28);
    ctx.fillRect(7, -88, 7, 28);
    // jacket buttons
    ctx.fillStyle = '#0c0c10';
    ctx.fillRect(-3, -48, 4, 4);
    ctx.fillRect(-3, -40, 4, 4);

    // shield arm (trailing, off-hand) — plain suit sleeve down to a gloved fist
    ctx.fillStyle = col('#23232b');
    ctx.fillRect(24, -90, 16, 22);
    ctx.fillStyle = col('#23232b');
    ctx.fillRect(27, -70, 13, 22); // sleeve forearm
    ctx.fillStyle = '#1c1c22';
    ctx.fillRect(28, -50, 11, 8); // glove/fist gripping the shield strap

    // round-ish shield held low on the off-hand arm — gunmetal with a 5-point star
    ctx.save();
    ctx.translate(40, -38);
    ctx.fillStyle = col('#6a6e78');
    ctx.beginPath();
    ctx.moveTo(-18, -34);
    ctx.lineTo(18, -34);
    ctx.lineTo(16, 10);
    ctx.lineTo(0, 26);
    ctx.lineTo(-16, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#9296a0';
    ctx.lineWidth = 2;
    ctx.stroke();
    // inner panel line
    ctx.strokeStyle = '#52565e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-14, -28); ctx.lineTo(14, -28); ctx.lineTo(13, 6); ctx.lineTo(0, 18); ctx.lineTo(-13, 6);
    ctx.closePath();
    ctx.stroke();
    // 5-point star emblem
    ctx.fillStyle = '#e2e4ea';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const ang = -Math.PI/2 + i * (Math.PI * 2 / 5);
      const ang2 = ang + Math.PI/5;
      const r1 = 11, r2 = 4.5;
      const x1 = Math.cos(ang) * r1, y1 = Math.sin(ang) * r1 - 8;
      const x2 = Math.cos(ang2) * r2, y2 = Math.sin(ang2) * r2 - 8;
      if (i === 0) ctx.moveTo(x1, y1); else ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // sword arm (lead arm) — full segmented dark plate armor, shoulder to wrist
    ctx.fillStyle = col('#34373f');
    ctx.fillRect(-46, -92, 18, 24); // pauldron
    ctx.strokeStyle = '#6a7080';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-46, -92, 18, 24);
    ctx.fillStyle = col('#282a31');
    ctx.fillRect(-44, -68, 14, 36); // upper arm to forearm plating
    // segment lines down the arm
    ctx.fillStyle = col('#3a3d46');
    ctx.fillRect(-44, -60, 14, 4);
    ctx.fillRect(-44, -48, 14, 4);
    ctx.fillRect(-44, -36, 14, 4);
    // gauntlet fist
    ctx.fillStyle = col('#2c1f18');
    ctx.fillRect(-40, -32, 11, 10);

    // head — dark spiky hair, tan skin, sharp angled brow, smirk, looking off to the side
    ctx.fillStyle = '#c98f6b';
    ctx.fillRect(-13, -106, 26, 18);
    // jaw/cheek shading toward the back of the head
    ctx.fillStyle = '#b87a58';
    ctx.fillRect(-13, -96, 8, 8);
    // angled angry brow
    ctx.fillStyle = '#7a4e34';
    ctx.fillRect(-10, -101, 11, 3);
    ctx.fillRect(2, -100, 9, 2);
    // narrowed focused eyes
    ctx.fillStyle = '#1b1410';
    ctx.fillRect(-8, -98, 6, 3);
    ctx.fillRect(4, -97, 6, 3);
    // smirking mouth
    ctx.fillStyle = '#8a5238';
    ctx.fillRect(-6, -90, 11, 2);
    ctx.fillStyle = '#3a241a';
    ctx.fillRect(2, -90, 3, 2);
    // tall messy spiky dark hair
    ctx.fillStyle = col('#15131a');
    ctx.fillRect(-15, -111, 30, 8);
    ctx.fillRect(-17, -107, 5, 7);
    ctx.fillRect(12, -106, 5, 6);
    ctx.fillRect(-11, -118, 6, 8);
    ctx.fillRect(-2, -120, 6, 9);
    ctx.fillRect(6, -117, 6, 7);
    ctx.fillRect(13, -112, 4, 5);

    // massive greatsword — angled down-and-forward, tip toward the ground, faint smoke trailing the blade
    ctx.save();
    ctx.translate(-38, -34);
    ctx.rotate(1.0); // blade swings down toward the lower-front, matching the reference pose
    // smoke wisps drifting off the blade
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#8a8fa0';
    ctx.fillRect(10, -10, 5, 5);
    ctx.fillRect(20, -22, 4, 4);
    ctx.fillRect(4, 18, 4, 4);
    ctx.globalAlpha = 1;
    // ornate crossguard
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-12, -4, 30, 8);
    ctx.fillRect(-14, -7, 5, 14);
    ctx.fillRect(15, -7, 5, 14);
    // grip/handle
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(2, 3, 8, 16);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(2, 17, 8, 4); // pommel
    // blade
    ctx.fillStyle = '#9aa0ac';
    ctx.beginPath();
    ctx.moveTo(0, -4);
    ctx.lineTo(12, -4);
    ctx.lineTo(14, 110);
    ctx.lineTo(6, 122);
    ctx.lineTo(-2, 110);
    ctx.closePath();
    ctx.fill();
    // center fuller line
    ctx.strokeStyle = '#c4c8d0';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(6, 2);
    ctx.lineTo(6, 104);
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawBullets() {
    bullets.forEach(b => {
      // Trailing glow "background" behind every fired bullet for a streak/motion-blur look.
      const dir = Math.sign(b.vx) || 1;
      const trailLen = 26;
      const grad = ctx.createLinearGradient(b.x - trailLen*dir, b.y, b.x, b.y);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, b.color || '#ffd28c');
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = grad;
      if (dir > 0) ctx.fillRect(b.x - trailLen, b.y - b.h/2, trailLen, b.h);
      else ctx.fillRect(b.x, b.y - b.h/2, trailLen, b.h);
      ctx.globalAlpha = 1;

      ctx.fillStyle = b.color || '#ffd28c';
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life/30);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.flash ? 4 : 3, p.flash ? 4 : 3);
      ctx.globalAlpha = 1;
    });
  }

  function drawBackground() {
    const gy = GROUND_Y();

    // sky gradient (dusk urban combat tone)
    const sky = ctx.createLinearGradient(0, 0, 0, gy);
    sky.addColorStop(0, '#1a1530');
    sky.addColorStop(0.55, '#2a1f3a');
    sky.addColorStop(1, '#3a2a30');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, gy);

    // distant haze band near horizon
    const haze = ctx.createLinearGradient(0, gy - 80, 0, gy);
    haze.addColorStop(0, 'rgba(255,140,60,0)');
    haze.addColorStop(1, 'rgba(255,90,60,0.12)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, gy - 80, W, 80);

    // far skyline (slow parallax) — scrolls opposite to player movement, like real distant background
    ctx.fillStyle = '#1c1830';
    const farOffset = ((worldScroll * 0.15) % 160 + 160) % 160;
    for (let i = -1; i < 12; i++) {
      const bx = i * 160 - farOffset;
      const bw = 90 + (i*53)%70;
      const bh = 140 + (i*97)%180;
      ctx.fillRect(bx, gy - bh, bw, bh);
    }

    // near skyline with lit windows (faster parallax)
    const nearOffset = ((worldScroll * 0.4) % 130 + 130) % 130;
    for (let i = -1; i < 12; i++) {
      const bx = i * 130 - nearOffset;
      const bw = 75 + (i*61)%65;
      const bh = 110 + (i*83)%150;
      const by = gy - bh;
      ctx.fillStyle = '#241f33';
      ctx.fillRect(bx, by, bw, bh);
      // windows
      for (let wx = bx + 8; wx < bx + bw - 8; wx += 14) {
        for (let wy = by + 10; wy < gy - 14; wy += 18) {
          const lit = ((wx*7 + wy*13 + i*31) % 5) === 0;
          ctx.fillStyle = lit ? 'rgba(255,196,120,0.85)' : 'rgba(80,75,100,0.4)';
          ctx.fillRect(wx, wy, 6, 8);
        }
      }
    }

    // street level haze / smoke wisps
    ctx.fillStyle = 'rgba(255,140,60,0.05)';
    for (let i = 0; i < 4; i++) {
      const sx = (((i * 340 - worldScroll * 0.6) % (W + 200)) + (W + 200)) % (W + 200) - 100;
      ctx.beginPath();
      ctx.ellipse(sx, gy - 30, 90, 22, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // road surface
    const road = ctx.createLinearGradient(0, gy, 0, H);
    road.addColorStop(0, '#26242c');
    road.addColorStop(1, '#17151b');
    ctx.fillStyle = road;
    ctx.fillRect(0, gy, W, H - gy);

    // curb line
    ctx.fillStyle = '#3a3540';
    ctx.fillRect(0, gy, W, 4);

    // lane markings — static, the road itself doesn't scroll, only the background does
    ctx.fillStyle = 'rgba(255,196,120,0.55)';
    for (let x = -60; x < W; x += 60) {
      ctx.fillRect(x, gy + (H-gy)*0.45, 28, 5);
    }

    // scattered urban debris / barricades silhouettes — static, fixed to the road
    ctx.fillStyle = '#1b1820';
    for (let i = 0; i < 6; i++) {
      const px = i * 240 - 120;
      ctx.fillRect(px, gy - 18, 26, 18);
      ctx.fillRect(px + 4, gy - 30, 4, 12);
      ctx.fillRect(px + 18, gy - 30, 4, 12);
    }

    // ambient vignette
    const vg = ctx.createRadialGradient(W/2, H*0.55, H*0.25, W/2, H*0.55, H*0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  function drawWeaponPickup() {
    if (!weaponPickup) return;
    const stats = weaponPickup.stats;
    const bobY = Math.sin(weaponPickup.bob) * 6;
    ctx.save();
    ctx.translate(weaponPickup.x, weaponPickup.y - 30 + bobY);
    // glow ring
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = stats.bulletColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 8, 22, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    // gun body
    ctx.fillStyle = stats.bulletColor;
    ctx.fillRect(-16, -3, 32, 6);
    ctx.fillStyle = '#1b2333';
    ctx.fillRect(8, -7, 6, 6);
    ctx.fillRect(-18, 2, 8, 8);
    ctx.restore();
    ctx.fillStyle = stats.bulletColor;
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(stats.name, weaponPickup.x, weaponPickup.y - 52 + bobY);
  }

  function render() {
    drawBackground();
    if (state === 'menu' || state === 'charselect' || state === 'exited' || state === 'intro' || state === 'credits') return;
    drawWeaponPickup();
    enemies.forEach(drawEnemy);
    drawBoss();
    if (player.invuln <= 0 || Math.floor(frame/3)%2===0) {
      drawSoldier(player.x, GROUND_Y(), player.facing, player.invuln > 0 && Math.floor(frame/2)%2===0, player.vx !== 0);
    }
    drawBullets();
    drawParticles();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---- Background music + sound effects (procedural, no external files needed) ----
  let audioCtx = null;
  let musicEnabled = true;
  let musicTimer = null;
  let musicStep = 0;
  let nextNoteTime = 0;
  const STEP_DUR = 0.22;
  // Dark driving bass riff, loops indefinitely under the action.
  const BASS_RIFF = [110, 110, 130.81, 98, 110, 110, 146.83, 130.81];

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return; }
    nextNoteTime = audioCtx.currentTime + 0.1;
    musicStep = 0;
    if (musicTimer) clearInterval(musicTimer);
    musicTimer = setInterval(scheduleMusic, 100);
  }

  function playTone(freq, time, dur, type, vol) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(vol, time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + dur + 0.05);
  }

  function playNoiseHit(time, vol, dur) {
    if (!audioCtx) return;
    const bufferSize = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    noise.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start(time);
  }

  function scheduleMusic() {
    if (!audioCtx || !musicEnabled) return;
    while (nextNoteTime < audioCtx.currentTime + 0.3) {
      const freq = BASS_RIFF[musicStep % BASS_RIFF.length];
      playTone(freq, nextNoteTime, STEP_DUR * 0.9, 'sawtooth', 0.05);
      if (musicStep % 2 === 0) playNoiseHit(nextNoteTime, 0.16, 0.07);
      if (musicStep % 8 === 4) playTone(freq * 2, nextNoteTime, STEP_DUR * 0.5, 'square', 0.025);
      musicStep++;
      nextNoteTime += STEP_DUR;
    }
  }

  function playShotSound() {
    if (!audioCtx || !musicEnabled) return;
    const t = audioCtx.currentTime;
    playTone(420, t, 0.06, 'square', 0.04);
    playNoiseHit(t, 0.12, 0.05);
  }

  muteBtn.addEventListener('click', () => {
    musicEnabled = !musicEnabled;
    muteBtn.textContent = musicEnabled ? '🔊' : '🔇';
    if (audioCtx) {
      if (musicEnabled) audioCtx.resume();
      else audioCtx.suspend();
    }
  });

  // Some browsers require a user gesture before audio can start; any tap on the
  // overlay buttons (handled by initAudio() inside startGame) covers this, but we
  // also try on first generic pointer down as a safety net for older browsers.
  window.addEventListener('pointerdown', () => { if (!audioCtx) initAudio(); }, { once:true });

  fitCanvas();
  updateTopIconsVisibility();
  showIntro();
  loop();
})();

</script>
</body>
</html>
